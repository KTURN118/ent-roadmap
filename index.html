<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entelligence PM Roadmap</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f7f7f5;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem;
    }

    .page { max-width: 1100px; margin: 0 auto; }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .header-left h1 { font-size: 22px; font-weight: 500; }
    .header-left p { font-size: 13px; color: #888; margin-top: 3px; }

    .refresh-btn {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      color: #555;
    }
    .refresh-btn:hover { background: #f0f0ee; }

    .lanes {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    @media (max-width: 700px) {
      .lanes { grid-template-columns: 1fr 1fr; }
      body { padding: 1rem; }
    }

    .lane {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      overflow: hidden;
    }

    .lane-header {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .d-now     { background: #E24B4A; }
    .d-next    { background: #EF9F27; }
    .d-soon    { background: #378ADD; }
    .d-someday { background: #888780; }

    .lane-title { font-size: 13px; font-weight: 500; }
    .lane-count {
      margin-left: auto;
      font-size: 11px;
      color: #888;
      background: #f5f5f3;
      border-radius: 999px;
      padding: 1px 8px;
    }

    .lane-body {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-height: 60px;
    }

    .card {
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 8px;
      padding: 8px 10px;
      display: block;
      color: inherit;
      cursor: pointer;
      background: #fff;
    }
    .card:hover { background: #f7f7f5; }

    .card-name { font-size: 12px; font-weight: 500; line-height: 1.4; }
    .card-desc { font-size: 11px; color: #888; margin-top: 3px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 4px;
      margin-top: 4px;
    }
    .b-inprogress { background: #E6F1FB; color: #0C447C; }
    .b-planned    { background: #FAEEDA; color: #633806; }
    .b-backlog    { background: #f0f0ee; color: #666; }

    .empty { font-size: 11px; color: #bbb; text-align: center; padding: 12px 4px; }

    .unassigned {
      margin-top: 1.5rem;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      padding: 12px 16px;
    }
    .unassigned-title { font-size: 12px; font-weight: 500; color: #888; margin-bottom: 8px; }
    .unassigned-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      border: 1px dashed rgba(0,0,0,0.2);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 11px;
      color: #888;
      cursor: pointer;
      background: none;
    }
    .chip:hover { background: #f5f5f3; color: #444; }

    .loading { text-align: center; padding: 4rem 2rem; color: #888; font-size: 14px; }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid #e0e0e0;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      background: #fff0f0;
      border: 1px solid rgba(200,0,0,0.15);
      border-radius: 8px;
      padding: 1rem;
      font-size: 13px;
      color: #a00;
    }

    .footer { margin-top: 1.5rem; font-size: 11px; color: #bbb; text-align: right; }

    /* --- Gate --- */
    .gate {
      position: fixed; inset: 0;
      background: #f7f7f5;
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }
    .gate-box {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 14px;
      padding: 2rem 2.5rem;
      width: 100%; max-width: 360px;
      text-align: center;
    }
    .gate-logo { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .gate-sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
    .gate-input {
      width: 100%; padding: 9px 12px;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 8px; font-size: 14px;
      margin-bottom: 10px; outline: none;
    }
    .gate-input:focus { border-color: rgba(0,0,0,0.35); }
    .gate-btn {
      width: 100%; padding: 9px;
      background: #1a1a1a; color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; cursor: pointer;
    }
    .gate-btn:hover { background: #333; }
    .gate-error { font-size: 12px; color: #c00; margin-top: 8px; min-height: 16px; }

    /* --- Modal --- */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 560px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      transform: translateY(12px);
      transition: transform 0.15s ease;
    }
    .modal-overlay.open .modal {
      transform: translateY(0);
    }
    .modal-header {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }
    .modal-title { font-size: 17px; font-weight: 500; line-height: 1.3; }
    .modal-subtitle { font-size: 13px; color: #666; margin-top: 4px; line-height: 1.4; }
    .modal-close {
      background: none; border: none;
      font-size: 20px; color: #aaa;
      cursor: pointer; flex-shrink: 0;
      line-height: 1; padding: 2px;
    }
    .modal-close:hover { color: #555; }
    .modal-body { padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; }

    .modal-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .modal-field label {
      font-size: 11px;
      font-weight: 500;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      display: block;
      margin-bottom: 4px;
    }
    .modal-field .value {
      font-size: 13px;
      color: #1a1a1a;
    }
    .modal-field .value.muted { color: #aaa; }

    .modal-labels { display: flex; flex-wrap: wrap; gap: 5px; }
    .modal-label {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #f0f0ee;
      color: #555;
    }
    .modal-label.horizon-now     { background: #FDECEA; color: #9B2224; }
    .modal-label.horizon-next    { background: #FEF3E2; color: #7A4A00; }
    .modal-label.horizon-soon    { background: #E6F1FB; color: #0C447C; }
    .modal-label.horizon-someday { background: #F0F0EE; color: #555; }

    .priority-indicator {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 13px;
    }
    .priority-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .p-urgent  { background: #E24B4A; }
    .p-high    { background: #EF9F27; }
    .p-medium  { background: #378ADD; }
    .p-low     { background: #aaa; }
    .p-none    { background: #ddd; }
  </style>
</head>
<body>

<!-- Gate -->
<div class="gate" id="gate">
  <div class="gate-box">
    <div class="gate-logo">Entelligence</div>
    <div class="gate-sub">PM Roadmap · Enter password to continue</div>
    <input class="gate-input" type="password" id="gate-pw" placeholder="Password"
      onkeydown="if(event.key==='Enter')checkPassword()" autofocus />
    <button class="gate-btn" onclick="checkPassword()">Continue</button>
    <div class="gate-error" id="gate-error"></div>
  </div>
</div>

<!-- Main page -->
<div class="page" id="main-page" style="display:none">
  <div class="header">
    <div class="header-left">
      <h1>PM Roadmap</h1>
      <p id="subtitle">Loading projects from Linear…</p>
    </div>
    <button class="refresh-btn" onclick="loadRoadmap()">↻ Refresh</button>
  </div>
  <div id="root"><div class="loading"><div class="spinner"></div>Fetching your projects…</div></div>
  <div class="footer" id="footer"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
  const PASSWORD = 'entelligence2026';

  function checkPassword() {
    const val = document.getElementById('gate-pw').value;
    if (val === PASSWORD) {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('main-page').style.display = 'block';
      loadRoadmap();
    } else {
      document.getElementById('gate-error').textContent = 'Incorrect password. Try again.';
      document.getElementById('gate-pw').value = '';
      document.getElementById('gate-pw').focus();
    }
  }

  const HORIZONS = {
    now:     ['now'],
    next:    ['next'],
    soon:    ['soon'],
    someday: ['someday']
  };

  const LANES = [
    { key: 'now',     label: 'Now',     dot: 'd-now' },
    { key: 'next',    label: 'Next',    dot: 'd-next' },
    { key: 'soon',    label: 'Soon',    dot: 'd-soon' },
    { key: 'someday', label: 'Someday', dot: 'd-someday' },
  ];

  let allProjects = [];

  function classify(project) {
    const labels = (project.labels || []).map(l => l.toLowerCase());
    for (const [horizon, keywords] of Object.entries(HORIZONS)) {
      for (const kw of keywords) {
        if (labels.some(l => l.includes(kw))) return horizon;
      }
    }
    return null;
  }

  function badgeClass(status) {
    const t = (status?.type || '').toLowerCase();
    if (t === 'started') return 'b-inprogress';
    if (t === 'planned') return 'b-planned';
    return 'b-backlog';
  }

  function priorityLabel(p) {
    const map = { 0: ['No priority','p-none'], 1: ['Urgent','p-urgent'], 2: ['High','p-high'], 3: ['Medium','p-medium'], 4: ['Low','p-low'] };
    return map[p] || map[0];
  }

  function formatDate(d) {
    if (!d) return null;
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function horizonLabelClass(name) {
    const n = name.toLowerCase();
    if (n.includes('now')) return 'horizon-now';
    if (n.includes('next')) return 'horizon-next';
    if (n.includes('soon')) return 'horizon-soon';
    if (n.includes('someday')) return 'horizon-someday';
    return '';
  }

  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function openModal(projectId) {
    const p = allProjects.find(x => x.id === projectId);
    if (!p) return;

    document.getElementById('modal-title').textContent = p.name;
    document.getElementById('modal-subtitle').textContent = p.description || '';

    const [pLabel, pDot] = priorityLabel(p.priority);
    const startDate = formatDate(p.startDate);
    const targetDate = formatDate(p.targetDate);
    const statusName = p.status?.name || '—';
    const statusBadge = badgeClass(p.status);
    const leadName = p.lead?.name || null;

    const labelsHtml = (p.labels || []).length
      ? p.labels.map(l => `<span class="modal-label ${horizonLabelClass(l)}">${esc(l)}</span>`).join('')
      : '<span class="value muted">None</span>';

    document.getElementById('modal-body').innerHTML = `
      <div class="modal-row">
        <div class="modal-field">
          <label>Status</label>
          <span class="badge ${statusBadge}" style="font-size:12px;padding:2px 10px">${esc(statusName)}</span>
        </div>
        <div class="modal-field">
          <label>Priority</label>
          <span class="priority-indicator">
            <span class="priority-dot ${pDot}"></span>
            ${esc(pLabel)}
          </span>
        </div>
      </div>
      <div class="modal-row">
        <div class="modal-field">
          <label>Owner</label>
          <div class="value">${leadName ? esc(leadName) : '<span class="muted">Unassigned</span>'}</div>
        </div>
        <div class="modal-field">
          <label>Labels</label>
          <div class="modal-labels">${labelsHtml}</div>
        </div>
      </div>
      <div class="modal-row">
        <div class="modal-field">
          <label>Start Date</label>
          <div class="value ${startDate ? '' : 'muted'}">${startDate || 'Not set'}</div>
        </div>
        <div class="modal-field">
          <label>Target Date</label>
          <div class="value ${targetDate ? '' : 'muted'}">${targetDate || 'Not set'}</div>
        </div>
      </div>
    `;

    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function render(projects) {
    allProjects = projects;
    const lanes = { now: [], next: [], soon: [], someday: [] };
    const unassigned = [];

    for (const p of projects) {
      const h = classify(p);
      if (h) lanes[h].push(p); else unassigned.push(p);
    }

    const total = projects.length;
    document.getElementById('subtitle').textContent =
      `Product Management · ${total} active project${total !== 1 ? 's' : ''}`;

    let html = '<div class="lanes">';
    for (const { key, label, dot } of LANES) {
      const items = lanes[key];
      html += `<div class="lane">
        <div class="lane-header">
          <span class="dot ${dot}"></span>
          <span class="lane-title">${label}</span>
          <span class="lane-count">${items.length}</span>
        </div>
        <div class="lane-body">`;
      if (!items.length) {
        html += `<p class="empty">No projects</p>`;
      } else {
        for (const p of items) {
          const sn = p.status?.name || '';
          const bc = badgeClass(p.status);
          const desc = p.description || '';
          html += `<div class="card" onclick="openModal('${esc(p.id)}')">
            <div class="card-name">${esc(p.name)}</div>
            ${desc ? `<div class="card-desc">${esc(desc)}</div>` : ''}
            ${sn ? `<span class="badge ${bc}">${esc(sn)}</span>` : ''}
          </div>`;
        }
      }
      html += '</div></div>';
    }
    html += '</div>';

    if (unassigned.length) {
      html += `<div class="unassigned">
        <div class="unassigned-title">No horizon label (${unassigned.length})</div>
        <div class="unassigned-chips">`;
      for (const p of unassigned) {
        html += `<button class="chip" onclick="openModal('${esc(p.id)}')">${esc(p.name)}</button>`;
      }
      html += '</div></div>';
    }

    document.getElementById('root').innerHTML = html;
    document.getElementById('footer').textContent = 'Last updated ' + new Date().toLocaleString();
  }

  async function loadRoadmap() {
    document.getElementById('root').innerHTML =
      '<div class="loading"><div class="spinner"></div>Fetching projects…</div>';
    try {
      const res = await fetch('/api/projects');
      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      render(data.projects);
    } catch (err) {
      document.getElementById('root').innerHTML =
        `<div class="error"><strong>Could not load projects.</strong> ${esc(err.message)}</div>`;
      document.getElementById('subtitle').textContent = 'Error loading data';
    }
  }
</script>
</body>
</html>
