<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entelligence PM Roadmap</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F0F3FF;
      color: #111827;
      min-height: 100vh;
      padding: 2rem 2.5rem;
    }

    .page { max-width: 1200px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid rgba(64, 68, 162, 0.15);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #9233EA, #4044A2, #2563EB, #00AEEE);
      flex-shrink: 0;
    }

    .header-titles h1 {
      font-size: 20px;
      font-weight: 600;
      color: #293475;
      letter-spacing: -0.02em;
    }

    .header-titles p {
      font-size: 13px;
      color: #6B7280;
      margin-top: 1px;
      font-weight: 400;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #374151;
      background: #fff;
      border: 1px solid rgba(64, 68, 162, 0.2);
      border-radius: 999px;
      padding: 5px 12px 5px 5px;
      font-weight: 400;
    }

    .user-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      object-fit: cover;
    }

    .user-avatar-placeholder {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4044A2, #2563EB);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #fff;
      font-weight: 600;
    }

    .signout-btn {
      background: none;
      border: none;
      font-size: 12px;
      color: #9CA3AF;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      margin-left: 2px;
    }
    .signout-btn:hover { color: #4044A2; }

    .refresh-btn {
      background: #fff;
      border: 1px solid rgba(64, 68, 162, 0.2);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: #293475;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }
    .refresh-btn:hover {
      background: #F0F3FF;
      border-color: #4044A2;
    }

    /* Lanes */
    .lanes {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    @media (max-width: 800px) {
      .lanes { grid-template-columns: 1fr 1fr; }
      body { padding: 1rem; }
    }

    .lane {
      background: #fff;
      border: 1px solid rgba(64, 68, 162, 0.12);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(41, 52, 117, 0.06);
    }

    .lane-header {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(64, 68, 162, 0.08);
      display: flex;
      align-items: center;
      gap: 9px;
      background: #FAFBFF;
    }

    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .d-now     { background: #22C55E; }
    .d-next    { background: #EF9F27; }
    .d-soon    { background: #2563EB; }
    .d-someday { background: #9CA3AF; }

    .lane-title {
      font-size: 13px;
      font-weight: 600;
      color: #111827;
      letter-spacing: -0.01em;
    }

    .lane-count {
      margin-left: auto;
      font-size: 11px;
      font-weight: 500;
      color: #6B7280;
      background: #F0F3FF;
      border-radius: 999px;
      padding: 2px 9px;
    }

    .lane-body {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-height: 80px;
    }

    /* Cards */
    .card {
      border: 1px solid rgba(64, 68, 162, 0.1);
      border-radius: 10px;
      padding: 11px 13px;
      display: block;
      color: inherit;
      cursor: pointer;
      background: #fff;
      transition: all 0.15s;
    }
    .card:hover {
      border-color: #4044A2;
      box-shadow: 0 2px 8px rgba(64, 68, 162, 0.12);
      transform: translateY(-1px);
    }

    .card-name {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      color: #111827;
    }

    .card-desc {
      font-size: 12px;
      color: #6B7280;
      margin-top: 4px;
      line-height: 1.45;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 5px;
      margin-top: 6px;
    }
    .b-inprogress { background: #EFF6FF; color: #1D4ED8; }
    .b-planned    { background: #FFFBEB; color: #92400E; }
    .b-backlog    { background: #F9FAFB; color: #6B7280; border: 1px solid #E5E7EB; }

    .empty {
      font-size: 12px;
      color: #D1D5DB;
      text-align: center;
      padding: 16px 4px;
    }

    /* Unassigned */
    .unassigned {
      margin-top: 1.5rem;
      background: #fff;
      border: 1px solid rgba(64, 68, 162, 0.12);
      border-radius: 14px;
      padding: 14px 18px;
      box-shadow: 0 1px 4px rgba(41, 52, 117, 0.06);
    }
    .unassigned-title {
      font-size: 12px;
      font-weight: 600;
      color: #9CA3AF;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .unassigned-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      border: 1px solid rgba(64, 68, 162, 0.2);
      border-radius: 6px;
      padding: 4px 11px;
      font-size: 12px;
      font-weight: 400;
      color: #4B5563;
      cursor: pointer;
      background: #FAFBFF;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }
    .chip:hover {
      background: #F0F3FF;
      border-color: #4044A2;
      color: #293475;
    }

    /* Loading / Error */
    .loading { text-align: center; padding: 4rem 2rem; color: #9CA3AF; font-size: 14px; }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid #E5E7EB;
      border-top-color: #4044A2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 10px;
      padding: 1rem;
      font-size: 13px;
      color: #DC2626;
    }

    .footer {
      margin-top: 1.5rem;
      font-size: 11px;
      color: #D1D5DB;
      text-align: right;
    }

    /* Gate */
    .gate {
      position: fixed; inset: 0;
      background: #F0F3FF;
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }
    .gate-box {
      background: #fff;
      border: 1px solid rgba(64, 68, 162, 0.15);
      border-radius: 18px;
      padding: 2.5rem;
      width: 100%; max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(41, 52, 117, 0.12);
    }
    .gate-brandmark {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #9233EA, #4044A2, #2563EB, #00AEEE);
      margin: 0 auto 16px;
    }
    .gate-logo {
      font-size: 20px;
      font-weight: 700;
      color: #293475;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .gate-sub {
      font-size: 13px;
      color: #6B7280;
      margin-bottom: 2rem;
      line-height: 1.5;
    }
    .gate-google {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gate-error {
      font-size: 12px;
      color: #DC2626;
      margin-top: 1rem;
      min-height: 16px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(17, 24, 39, 0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: #fff;
      border-radius: 18px;
      width: 100%;
      max-width: 580px;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 16px 48px rgba(17, 24, 39, 0.2);
      transform: translateY(16px);
      transition: transform 0.15s ease;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      padding: 1.5rem 1.75rem 1.25rem;
      border-bottom: 1px solid #F3F4F6;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: #111827;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }
    .modal-subtitle {
      font-size: 13px;
      color: #6B7280;
      margin-top: 5px;
      line-height: 1.5;
    }
    .modal-close {
      background: #F9FAFB;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #9CA3AF;
      cursor: pointer; flex-shrink: 0;
    }
    .modal-close:hover { background: #F3F4F6; color: #374151; }

    .modal-body {
      padding: 1.5rem 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .modal-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    .modal-field label {
      font-size: 11px;
      font-weight: 600;
      color: #9CA3AF;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: block;
      margin-bottom: 5px;
    }
    .modal-field .value {
      font-size: 14px;
      color: #111827;
      font-weight: 400;
    }
    .modal-field .value.muted { color: #D1D5DB; }

    .modal-labels { display: flex; flex-wrap: wrap; gap: 5px; }
    .modal-label {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 999px;
      background: #F0F3FF;
      color: #4044A2;
      border: 1px solid rgba(64, 68, 162, 0.2);
    }
    .modal-label.horizon-now     { background: #F0FDF4; color: #15803D; border-color: rgba(21,128,61,0.2); }
    .modal-label.horizon-next    { background: #FFFBEB; color: #92400E; border-color: rgba(146,64,14,0.2); }
    .modal-label.horizon-soon    { background: #EFF6FF; color: #1D4ED8; border-color: rgba(29,78,216,0.2); }
    .modal-label.horizon-someday { background: #F9FAFB; color: #6B7280; border-color: #E5E7EB; }

    .priority-indicator {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 14px;
    }
    .priority-dot { width: 8px; height: 8px; border-radius: 50%; }
    .p-urgent  { background: #EF4444; }
    .p-high    { background: #F97316; }
    .p-medium  { background: #2563EB; }
    .p-low     { background: #D1D5DB; }
    .p-none    { background: #E5E7EB; }

    .modal-divider {
      border: none;
      border-top: 1px solid #F3F4F6;
      margin: 0;
    }

    .ask-section { display: flex; flex-direction: column; gap: 10px; }
    .ask-label {
      font-size: 11px;
      font-weight: 600;
      color: #9CA3AF;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .ask-textarea {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      resize: vertical;
      min-height: 88px;
      outline: none;
      color: #111827;
      background: #FAFAFA;
      transition: border-color 0.15s;
    }
    .ask-textarea:focus { border-color: #4044A2; background: #fff; }
    .ask-footer { display: flex; align-items: center; justify-content: space-between; }
    .ask-hint { font-size: 12px; color: #D1D5DB; }
    .ask-btn {
      background: linear-gradient(135deg, #4044A2, #2563EB);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.15s;
    }
    .ask-btn:hover { opacity: 0.9; }
    .ask-btn:disabled { opacity: 0.5; cursor: default; }
    .ask-success {
      font-size: 13px;
      color: #15803D;
      background: #F0FDF4;
      border: 1px solid rgba(21,128,61,0.2);
      border-radius: 8px;
      padding: 9px 13px;
      display: none;
    }
  </style>
</head>
<body>

<!-- Gate -->
<div class="gate" id="gate">
  <div class="gate-box">
    <div class="gate-brandmark"></div>
    <div class="gate-logo">entelligence</div>
    <div class="gate-sub">PM Roadmap · Sign in with your<br>Entelligence Google account to continue</div>
    <div class="gate-google">
      <div id="g_id_onload"
        data-client_id="860793114777-o11febiilppngnh5k0pl23jvsvegs2nm.apps.googleusercontent.com"
        data-callback="handleGoogleSignIn"
        data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
        data-type="standard"
        data-size="large"
        data-theme="outline"
        data-text="sign_in_with"
        data-shape="rectangular"
        data-logo_alignment="left">
      </div>
    </div>
    <div class="gate-error" id="gate-error"></div>
  </div>
</div>

<!-- Main page -->
<div class="page" id="main-page" style="display:none">
  <div class="header">
    <div class="header-left">
      <div class="brand-mark"></div>
      <div class="header-titles">
        <h1>PM Roadmap</h1>
        <p id="subtitle">Loading projects from Linear…</p>
      </div>
    </div>
    <div class="header-right">
      <div class="user-pill" id="user-pill" style="display:none">
        <span class="user-avatar-placeholder" id="user-avatar-placeholder"></span>
        <img class="user-avatar" id="user-avatar" style="display:none" />
        <span id="user-name"></span>
        <button class="signout-btn" onclick="signOut()">Sign out</button>
      </div>
      <button class="refresh-btn" onclick="loadRoadmap()">↻ Refresh</button>
    </div>
  </div>

  <div id="root">
    <div class="loading"><div class="spinner"></div>Fetching your projects…</div>
  </div>
  <div class="footer" id="footer"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
  const ALLOWED_DOMAIN = 'entelligence.com';
  let currentUser = null;

  function handleGoogleSignIn(response) {
    const payload = parseJwt(response.credential);
    const email = payload.email || '';
    if (!email.endsWith('@' + ALLOWED_DOMAIN)) {
      document.getElementById('gate-error').textContent =
        'Access restricted to @entelligence.com accounts.';
      return;
    }
    currentUser = {
      name: payload.given_name || payload.name || email.split('@')[0],
      email,
      picture: payload.picture || null,
      initials: (payload.given_name || email)[0].toUpperCase()
    };
    document.getElementById('user-name').textContent = currentUser.name;
    const placeholder = document.getElementById('user-avatar-placeholder');
    placeholder.textContent = currentUser.initials;
    if (currentUser.picture) {
      const img = document.getElementById('user-avatar');
      img.src = currentUser.picture;
      img.style.display = 'block';
      placeholder.style.display = 'none';
    }
    document.getElementById('user-pill').style.display = 'flex';
    document.getElementById('gate').style.display = 'none';
    document.getElementById('main-page').style.display = 'block';
    loadRoadmap();
  }

  function signOut() {
    currentUser = null;
    document.getElementById('gate').style.display = 'flex';
    document.getElementById('main-page').style.display = 'none';
    document.getElementById('gate-error').textContent = '';
  }

  function parseJwt(token) {
    const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(atob(base64));
  }

  const HORIZONS = {
    now:     ['now'],
    next:    ['next'],
    soon:    ['soon'],
    someday: ['someday']
  };

  const LANES = [
    { key: 'now',     label: 'Now',     dot: 'd-now' },
    { key: 'next',    label: 'Next',    dot: 'd-next' },
    { key: 'soon',    label: 'Soon',    dot: 'd-soon' },
    { key: 'someday', label: 'Someday', dot: 'd-someday' },
  ];

  let allProjects = [];

  function classify(project) {
    const labels = (project.labels || []).map(l => l.toLowerCase());
    for (const [horizon, keywords] of Object.entries(HORIZONS)) {
      for (const kw of keywords) {
        if (labels.some(l => l.includes(kw))) return horizon;
      }
    }
    return null;
  }

  function badgeClass(status) {
    const t = (status?.type || '').toLowerCase();
    if (t === 'started') return 'b-inprogress';
    if (t === 'planned') return 'b-planned';
    return 'b-backlog';
  }

  function priorityLabel(p) {
    const map = {
      0: ['No priority', 'p-none'],
      1: ['Urgent', 'p-urgent'],
      2: ['High', 'p-high'],
      3: ['Medium', 'p-medium'],
      4: ['Low', 'p-low']
    };
    return map[p] || map[0];
  }

  function formatDate(d) {
    if (!d) return null;
    return new Date(d + 'T00:00:00').toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric'
    });
  }

  function horizonLabelClass(name) {
    const n = name.toLowerCase();
    if (n.includes('now')) return 'horizon-now';
    if (n.includes('next')) return 'horizon-next';
    if (n.includes('soon')) return 'horizon-soon';
    if (n.includes('someday')) return 'horizon-someday';
    return '';
  }

  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function openModal(projectId) {
    const p = allProjects.find(x => x.id === projectId);
    if (!p) return;

    document.getElementById('modal-title').textContent = p.name;
    document.getElementById('modal-subtitle').textContent = p.description || '';

    const [pLabel, pDot] = priorityLabel(p.priority);
    const startDate = formatDate(p.startDate);
    const targetDate = formatDate(p.targetDate);
    const statusName = p.status?.name || '—';
    const statusBadge = badgeClass(p.status);
    const leadName = p.lead?.name || null;

    const labelsHtml = (p.labels || []).length
      ? p.labels.map(l => `<span class="modal-label ${horizonLabelClass(l)}">${esc(l)}</span>`).join('')
      : '<span class="value muted">None</span>';

    document.getElementById('modal-body').innerHTML = `
      <div class="modal-row">
        <div class="modal-field">
          <label>Status</label>
          <span class="badge ${statusBadge}" style="font-size:12px;padding:3px 10px">${esc(statusName)}</span>
        </div>
        <div class="modal-field">
          <label>Priority</label>
          <span class="priority-indicator">
            <span class="priority-dot ${pDot}"></span>
            <span class="value">${esc(pLabel)}</span>
          </span>
        </div>
      </div>
      <div class="modal-row">
        <div class="modal-field">
          <label>Owner</label>
          <div class="value">${leadName ? esc(leadName) : '<span class="muted">Unassigned</span>'}</div>
        </div>
        <div class="modal-field">
          <label>Labels</label>
          <div class="modal-labels">${labelsHtml}</div>
        </div>
      </div>
      <div class="modal-row">
        <div class="modal-field">
          <label>Start Date</label>
          <div class="value ${startDate ? '' : 'muted'}">${startDate || 'Not set'}</div>
        </div>
        <div class="modal-field">
          <label>Target Date</label>
          <div class="value ${targetDate ? '' : 'muted'}">${targetDate || 'Not set'}</div>
        </div>
      </div>
      <hr class="modal-divider" />
      <div class="ask-section">
        <div class="ask-label">Ask a question about this project</div>
        <textarea class="ask-textarea" id="ask-input-${esc(p.id)}"
          placeholder="What would you like to know?"></textarea>
        <div class="ask-footer">
          <span class="ask-hint">Sent to the PM team</span>
          <button class="ask-btn" onclick="submitAsk('${esc(p.id)}', '${esc(p.name)}')">
            Send question
          </button>
        </div>
        <div class="ask-success" id="ask-success-${esc(p.id)}">
          ✓ Your question has been sent to the PM team.
        </div>
      </div>
    `;

    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  async function submitAsk(projectId, projectName) {
    const textarea = document.getElementById('ask-input-' + projectId);
    const question = (textarea?.value || '').trim();
    if (!question) return;

    const btn = document.querySelector(`button[onclick="submitAsk('${projectId}', '${projectName}')"]`);
    if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }

    try {
      const res = await fetch('/api/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          projectId, projectName, question,
          askedBy: currentUser?.email || 'Unknown'
        })
      });
      if (!res.ok) throw new Error('Failed to send');
      const success = document.getElementById('ask-success-' + projectId);
      if (success) success.style.display = 'block';
      if (textarea) textarea.value = '';
      if (btn) btn.style.display = 'none';
    } catch(err) {
      if (btn) { btn.disabled = false; btn.textContent = 'Send question'; }
      alert('Something went wrong. Please try again.');
    }
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function render(projects) {
    allProjects = projects;
    const lanes = { now: [], next: [], soon: [], someday: [] };
    const unassigned = [];

    for (const p of projects) {
      const h = classify(p);
      if (h) lanes[h].push(p); else unassigned.push(p);
    }

    const total = projects.length;
    document.getElementById('subtitle').textContent =
      `Product Management · ${total} active project${total !== 1 ? 's' : ''}`;

    let html = '<div class="lanes">';
    for (const { key, label, dot } of LANES) {
      const items = lanes[key];
      html += `<div class="lane">
        <div class="lane-header">
          <span class="dot ${dot}"></span>
          <span class="lane-title">${label}</span>
          <span class="lane-count">${items.length}</span>
        </div>
        <div class="lane-body">`;
      if (!items.length) {
        html += `<p class="empty">No projects</p>`;
      } else {
        for (const p of items) {
          const sn = p.status?.name || '';
          const bc = badgeClass(p.status);
          const desc = p.description || '';
          html += `<div class="card" onclick="openModal('${esc(p.id)}')">
            <div class="card-name">${esc(p.name)}</div>
            ${desc ? `<div class="card-desc">${esc(desc)}</div>` : ''}
            ${sn ? `<span class="badge ${bc}">${esc(sn)}</span>` : ''}
          </div>`;
        }
      }
      html += '</div></div>';
    }
    html += '</div>';

    if (unassigned.length) {
      html += `<div class="unassigned">
        <div class="unassigned-title">No horizon label · ${unassigned.length}</div>
        <div class="unassigned-chips">`;
      for (const p of unassigned) {
        html += `<button class="chip" onclick="openModal('${esc(p.id)}')">${esc(p.name)}</button>`;
      }
      html += '</div></div>';
    }

    document.getElementById('root').innerHTML = html;
    document.getElementById('footer').textContent =
      'Last updated ' + new Date().toLocaleString();
  }

  async function loadRoadmap() {
    document.getElementById('root').innerHTML =
      '<div class="loading"><div class="spinner"></div>Fetching projects…</div>';
    try {
      const res = await fetch('/api/projects');
      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      render(data.projects);
    } catch (err) {
      document.getElementById('root').innerHTML =
        `<div class="error"><strong>Could not load projects.</strong> ${esc(err.message)}</div>`;
      document.getElementById('subtitle').textContent = 'Error loading data';
    }
  }
</script>
</body>
</html>
